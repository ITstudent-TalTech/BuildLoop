<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>BUILDLoop — Create a building passport</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body, #root { margin: 0; padding: 0; min-height: 100%; }
  body { background: #f6f8f7; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
  button { font: inherit; }
  ::selection { background: #c8e6d3; color: #0d1f17; }
  @keyframes bl-spin { to { transform: rotate(360deg); } }
  @keyframes bl-fade-in {
    from { opacity: 0; transform: translateY(2px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Responsive: stack explainer cards and condense step indicator below 768 */
  @media (max-width: 767px) {
    .bl-stepbar-full { display: none !important; }
    .bl-stepbar-mini { display: flex !important; }
    .bl-explainer-grid { grid-template-columns: 1fr !important; }
    .bl-explainer-cell { border-right: none !important; }
    .bl-explainer-cell:not([data-last]) {
      border-bottom: 1px solid rgba(13, 31, 23, 0.08) !important;
    }
    main { padding: 32px 18px 64px !important; }
    h1 { font-size: 26px !important; }
  }
</style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="address-intake.jsx"></script>
</body>
</html>
