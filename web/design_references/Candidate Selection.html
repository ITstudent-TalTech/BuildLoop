<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />

<link rel="preconnect" href="https://fonts.googleapis.com" />

<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body, #root { margin: 0; padding: 0; min-height: 100%; }
  body { background: #f6f8f7; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
  button { font: inherit; }
  ::selection { background: #c8e6d3; color: #0d1f17; }
  @keyframes bl-spin { to { transform: rotate(360deg); } }
  @keyframes bl-shimmer {
    0% { background-position: 100% 0; }
    100% { background-position: -100% 0; }
  }
  @media (max-width: 767px) {
    .bl-stepbar-full { display: none !important; }
    .bl-stepbar-mini { display: flex !important; }
    main { padding: 28px 18px 64px !important; }
    h1 { font-size: 24px !important; }
  }
</style>
</head>

  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
